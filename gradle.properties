# Project-wide Gradle settings.

# Minimal memory footprint for 4GB RAM machines
org.gradle.jvmargs=-Xmx1024m -XX:MaxMetaspaceSize=256m -Dfile.encoding=UTF-8
# Limit to a single worker to prevent memory spikes
org.gradle.workers.max=1
org.gradle.parallel=false
# Disable memory-intensive background services
org.gradle.vfs.watch=false
org.gradle.caching=false

# Increase internal timeouts (in milliseconds)
systemProp.org.gradle.internal.http.connectionTimeout=120000
systemProp.org.gradle.internal.http.socketTimeout=120000

# Limit Kotlin compiler daemon memory
kotlin.daemon.jvm.options=-Xmx512m

# AndroidX and standard settings
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
